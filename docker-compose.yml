services:
  tcm-ai:
    build: .
    container_name: tcm-ai
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      TCM_HOST: "0.0.0.0"
      TCM_PORT: "8000"
      TCM_ENV: "production"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./tcm_knowledge:/app/tcm_knowledge
      - ./vector_store:/app/vector_store
      - ./models:/app/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
