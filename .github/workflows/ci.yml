name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run unit & integration tests with coverage
        run: |
          pytest tests/unit tests/integration -q \
            --cov=tcm_ai \
            --cov-report=term-missing \
            --cov-fail-under=48

      - name: Syntax check
        run: python -m py_compile $(find tcm_ai -name '*.py') web_server.py scripts/build_index.py

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t tcm-ai:ci .

      - name: Smoke test (development mode)
        run: |
          docker run -d --name tcm-smoke -p 18000:8000 \
            -e TCM_ENV=development \
            tcm-ai:ci
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:18000/api/health; then
              echo "health ok"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:18000/api/ready
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:18000/admin | grep -q 200
          docker logs tcm-smoke --tail 30
          docker stop tcm-smoke
