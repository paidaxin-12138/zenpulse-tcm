# Nginx 反代示例 — 复制到 /etc/nginx/sites-available/tcm-ai 并按域名修改
# 需配合 TLS 证书（certbot / 云厂商证书）

upstream tcm_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=tcm_public:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=tcm_admin:10m rate=60r/m;

server {
    listen 443 ssl http2;
    server_name your-domain.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;

    client_max_body_size 20m;

    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://tcm_backend;
        proxy_set_header Host $host;
    }

    location /api/admin/ {
        limit_req zone=tcm_admin burst=20 nodelay;
        proxy_pass http://tcm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        limit_req zone=tcm_public burst=40 nodelay;
        proxy_pass http://tcm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://tcm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name your-domain.example.com;
    return 301 https://$host$request_uri;
}
